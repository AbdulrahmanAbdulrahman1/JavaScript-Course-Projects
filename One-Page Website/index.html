<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelrahman Abdelrahman | Web Portfolio</title>
    <style>
        /* --- General Settings --- */
        body {
            background-color: #e5e5f7;
            background-image: radial-gradient(#444cf7 0.5px, #e5e5f7 0.5px);
            background-size: 10px 10px;
            font-family: 'Helvetica', 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* --- Main Container (Boxed Layout) --- */
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #c0392b;
        }

        /* --- Navigation --- */
        nav {
            background-color: #fff;
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: #555;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding-bottom: 5px;
        }

        nav a:hover {
            color: #c0392b;
            border-bottom: 2px solid #c0392b;
        }

        /* --- Sections --- */
        section {
            padding: 50px 40px;
            border-bottom: 1px solid #f0f0f0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        h2 {
            font-size: 1.5rem;
            color: #c0392b;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            line-height: 1.8;
            color: #666;
        }

        /* --- Hero Section --- */
        header#home {
            text-align: center;
            padding: 80px 20px;
            background-color: #fcfcfc;
        }

        /* --- Gallery (Circular Images) --- */
        .image-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .image-row img {
            width: 30%;
            min-width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer; /* Indicates it can be clicked */
        }

        .image-row img:hover {
            transform: scale(1.05);
            border-color: #c0392b;
        }

        /* --- Lightbox Styles --- */
        #lightbox {
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 4px; /* Optional: square look for full view */
        }

        /* --- Video --- */
        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Contact Form --- */
        form {
            display: grid;
            gap: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            background: #fafafa;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #c0392b;
            background: #fff;
        }

        button {
            background-color: #2c3e50;
            color: white;
            padding: 12px 25px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: auto;
            justify-self: start;
        }

        button:hover {
            background-color: #c0392b;
        }

        /* --- Footer --- */
        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">

    <nav>
        <a href="#home">Profile</a>
        <a href="#portfolio">Photos</a>
        <a href="#media">Media</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <header>
            <h1>Abdelrahman Abdelrahman</h1>
            <p><strong>Student | Developer | Builder</strong></p>
            <p>Welcome to my digital resume. I focus on clean code and strong foundations.</p>
        </header>
    </section>

    <section id="portfolio">
        <h2>Visual Portfolio</h2>
        <div class="image-row">
            <img src="https://cdn.pixabay.com/photo/2025/01/30/16/15/hearts-9370507_1280.jpg" alt="Heart Image 1">
            <img src="https://cdn.pixabay.com/photo/2025/01/30/16/15/hearts-9370507_1280.jpg" alt="Heart Image 2">
            <img src="https://cdn.pixabay.com/photo/2025/01/30/16/15/hearts-9370507_1280.jpg" alt="Heart Image 3">
        </div>
    </section>

    <section id="media">
        <h2>Current Project Demo</h2>
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/M7lc1UVf-VE" title="YouTube video player" allowfullscreen></iframe>
        </div>
    </section>

    <section id="contact">
        <h2>Get in Touch</h2>
        <form>
            <label for="fname">Name</label>
            <input type="text" id="fname" name="firstname" placeholder="Enter your full name">

            <label for="mail">Email</label>
            <input type="email" id="mail" name="email" placeholder="Enter your email address">

            <label for="msg">Message</label>
            <textarea id="msg" name="message" rows="4" placeholder="How can we collaborate?"></textarea>

            <button type="submit">Submit Inquiry</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Abdelrahman Abdelrahman. All rights reserved.</p>
    </footer>

</div>

<div id="lightbox">
    <img src="" alt="Enlarged view">
</div>

<script>
    // Lightbox Logic
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    const galleryImages = document.querySelectorAll('.image-row img');

    galleryImages.forEach(image => {
        image.addEventListener('click', () => {
            // Set the clicked image's source to the lightbox image
            lightboxImg.src = image.src;
            // Show the lightbox
            lightbox.style.display = 'flex';
        });
    });

    // Close lightbox when clicking anywhere on the overlay
    lightbox.addEventListener('click', () => {
        lightbox.style.display = 'none';
    });
</script>

</body>
</html>
